<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SolucionAir — Portal de Agencias</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap');
    :root{--g:#2D4A3E;--gl:#3A6154;--gd:#1E332B;--au:#D4A853;--aul:#E0BE7A;--bg:#F5F3EE;--bgd:#EDE9E1;--w:#FFF;--t1:#111;--t2:#3A3A3A;--t3:#6B6B6B;--t4:#999;--bd:#E0DCD4;--bdl:#EDEAE4;--ok:#1B9B5A;--okbg:#EDF9F0;--err:#C0392B;--errbg:#FDF0EE;--warn:#D4A853;--warnbg:#FDF8EE;--f:'Inter',system-ui,sans-serif;--fh:'Plus Jakarta Sans','Inter',sans-serif;--fm:'JetBrains Mono',monospace;--ez:cubic-bezier(.4,0,.2,1)}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{font-size:15px}body{font-family:var(--f);color:var(--t1);background:var(--bg);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

    .topbar{background:var(--gd);padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
    .topbar__brand{display:flex;align-items:center;gap:8px;text-decoration:none}
    .topbar__logo{width:28px;height:28px;background:var(--g);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--au)}
    .topbar__name{font-family:var(--fh);font-weight:700;font-size:.95rem;color:var(--w)}
    .topbar__tag{font-family:var(--fm);font-size:.58rem;color:var(--au);background:rgba(212,168,83,.15);padding:1px 6px;border-radius:8px;margin-left:4px}
    .topbar__link{font-size:.76rem;color:rgba(255,255,255,.5);text-decoration:none}
    .topbar__link:hover{color:var(--w)}

    .shell{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
    .card{background:var(--w);border:1px solid var(--bdl);border-radius:14px;padding:36px 32px;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,.06)}

    .card__title{font-family:var(--fh);font-size:1.3rem;font-weight:800;color:var(--g);margin-bottom:4px}
    .card__sub{font-size:.82rem;color:var(--t3);margin-bottom:24px}

    .tabs{display:flex;gap:0;border-bottom:2px solid var(--bdl);margin-bottom:24px}
    .tab{padding:8px 18px;font-family:var(--fh);font-size:.78rem;font-weight:700;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
    .tab.active{color:var(--g);border-bottom-color:var(--g)}

    .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
    .form-group label{font-size:.72rem;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em}
    .form-group input,.form-group select{font-family:var(--f);font-size:.84rem;padding:9px 11px;border:1px solid var(--bd);border-radius:6px;background:var(--w);color:var(--t1);transition:border-color .15s;width:100%}
    .form-group input:focus,.form-group select:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px rgba(45,74,62,.08)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px 18px;border-radius:7px;font-family:var(--fh);font-size:.82rem;font-weight:700;cursor:pointer;border:none;transition:all .15s;margin-top:4px}
    .btn--primary{background:var(--g);color:var(--w)}.btn--primary:hover{background:var(--gl)}
    .btn--primary:disabled{opacity:.55;cursor:not-allowed}

    .msg{font-family:var(--fm);font-size:.72rem;margin-top:10px;min-height:16px;text-align:center}
    .msg--ok{color:var(--ok)}.msg--err{color:var(--err)}

    .notice{background:var(--warnbg);border:1px solid rgba(212,168,83,.3);border-radius:8px;padding:14px 16px;font-size:.8rem;color:var(--t2);line-height:1.55;display:none}
    .notice strong{color:var(--warn)}

    .ft{background:var(--gd);text-align:center;padding:16px;font-size:.66rem;color:rgba(255,255,255,.2)}

    @media(max-width:500px){.card{padding:24px 18px}.form-row{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div class="topbar">
  <a class="topbar__brand" href="/">
    <div class="topbar__logo"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg></div>
    <span class="topbar__name">SolucionAir</span>
    <span class="topbar__tag">Agencias</span>
  </a>
  <a class="topbar__link" href="/">Volver al sitio</a>
</div>

<div class="shell">
  <div class="card">
    <div class="card__title">Portal de Agencias</div>
    <div class="card__sub">Accedé o registrá tu agencia para operar casos B2B</div>

    <div class="tabs">
      <div class="tab active" id="tab-login">Ingresar</div>
      <div class="tab" id="tab-register">Registrarse</div>
    </div>

    <!-- LOGIN -->
    <div id="panel-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="agencia@ejemplo.com" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-password" autocomplete="current-password" />
      </div>
      <button class="btn btn--primary" id="btn-login" type="button">Ingresar</button>
      <div class="msg" id="login-msg"></div>

      <div class="notice" id="notice-pending">
        <strong>Cuenta en revisión</strong><br/>
        Tu solicitud fue recibida y está siendo revisada por el equipo de SolucionAir. Te avisamos cuando esté aprobada.
      </div>
    </div>

    <!-- REGISTRO -->
    <div id="panel-register" style="display:none">
      <div class="form-group">
        <label>Nombre de la agencia / tu nombre</label>
        <input type="text" id="reg-nombre" placeholder="Viajes López S.A. o Juan García" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tipo</label>
          <select id="reg-tipo">
            <option value="agencia">Agencia</option>
            <option value="individual">Agente individual</option>
          </select>
        </div>
        <div class="form-group">
          <label>CUIT / DNI</label>
          <input type="text" id="reg-cuit" placeholder="20-12345678-9" />
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="agencia@ejemplo.com" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Teléfono (WhatsApp)</label>
        <input type="tel" id="reg-telefono" placeholder="+54 9 11 1234-5678" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="reg-password" autocomplete="new-password" placeholder="Mínimo 8 caracteres" />
      </div>
      <button class="btn btn--primary" id="btn-register" type="button">Solicitar acceso</button>
      <div class="msg" id="register-msg"></div>
    </div>
  </div>
</div>

<div class="ft">&copy; 2026 SolucionAir &mdash; Portal B2B</div>

<script>
(function () {
  /* Si ya hay sesión activa, redirigir al panel */
  if (localStorage.getItem('sa_ag_token')) {
    window.location.href = '/panel-agencia';
    return;
  }

  var tabLogin    = document.getElementById('tab-login');
  var tabRegister = document.getElementById('tab-register');
  var panelLogin  = document.getElementById('panel-login');
  var panelReg    = document.getElementById('panel-register');

  tabLogin.addEventListener('click', function () {
    tabLogin.classList.add('active'); tabRegister.classList.remove('active');
    panelLogin.style.display = ''; panelReg.style.display = 'none';
  });
  tabRegister.addEventListener('click', function () {
    tabRegister.classList.add('active'); tabLogin.classList.remove('active');
    panelReg.style.display = ''; panelLogin.style.display = 'none';
  });

  /* ---- Login ---- */
  var btnLogin  = document.getElementById('btn-login');
  var loginMsg  = document.getElementById('login-msg');
  var noticePending = document.getElementById('notice-pending');

  btnLogin.addEventListener('click', function () {
    var email    = document.getElementById('login-email').value.trim();
    var password = document.getElementById('login-password').value;
    loginMsg.textContent = ''; noticePending.style.display = 'none';
    if (!email || !password) { loginMsg.className = 'msg msg--err'; loginMsg.textContent = 'Completá email y contraseña.'; return; }
    btnLogin.disabled = true; btnLogin.textContent = 'Ingresando...';
    fetch('/api/agency/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password }),
    })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      btnLogin.disabled = false; btnLogin.textContent = 'Ingresar';
      if (!d.success) {
        loginMsg.className = 'msg msg--err';
        loginMsg.textContent = d.error || 'Error al ingresar.';
        return;
      }
      if (d.estado === 'pendiente') {
        noticePending.style.display = 'block';
        return;
      }
      /* Cuenta activa: guardar sesión y redirigir */
      localStorage.setItem('sa_ag_token', d.token);
      localStorage.setItem('sa_ag_email', d.email);
      localStorage.setItem('sa_ag_data', JSON.stringify(d.agencia));
      window.location.href = '/panel-agencia';
    })
    .catch(function () {
      btnLogin.disabled = false; btnLogin.textContent = 'Ingresar';
      loginMsg.className = 'msg msg--err'; loginMsg.textContent = 'Error de conexión.';
    });
  });

  /* Enter en campos de login */
  ['login-email', 'login-password'].forEach(function (id) {
    document.getElementById(id).addEventListener('keydown', function (e) {
      if (e.key === 'Enter') btnLogin.click();
    });
  });

  /* ---- Registro ---- */
  var btnReg  = document.getElementById('btn-register');
  var regMsg  = document.getElementById('register-msg');

  btnReg.addEventListener('click', function () {
    var nombre   = document.getElementById('reg-nombre').value.trim();
    var tipo     = document.getElementById('reg-tipo').value;
    var cuit_dni = document.getElementById('reg-cuit').value.trim();
    var email    = document.getElementById('reg-email').value.trim();
    var telefono = document.getElementById('reg-telefono').value.trim();
    var password = document.getElementById('reg-password').value;

    regMsg.textContent = '';
    if (!nombre || !email || !password) {
      regMsg.className = 'msg msg--err'; regMsg.textContent = 'Nombre, email y contraseña son obligatorios.'; return;
    }
    if (password.length < 8) {
      regMsg.className = 'msg msg--err'; regMsg.textContent = 'La contraseña debe tener al menos 8 caracteres.'; return;
    }

    btnReg.disabled = true; btnReg.textContent = 'Enviando solicitud...';
    fetch('/api/agency/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre: nombre, tipo: tipo, cuit_dni: cuit_dni, email: email, telefono: telefono, password: password }),
    })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      btnReg.disabled = false; btnReg.textContent = 'Solicitar acceso';
      if (d.success) {
        regMsg.className = 'msg msg--ok';
        regMsg.textContent = 'Solicitud enviada. Te avisaremos cuando tu cuenta sea aprobada.';
        document.getElementById('reg-nombre').value = '';
        document.getElementById('reg-email').value = '';
        document.getElementById('reg-password').value = '';
        document.getElementById('reg-cuit').value = '';
        document.getElementById('reg-telefono').value = '';
      } else {
        regMsg.className = 'msg msg--err';
        regMsg.textContent = d.error || 'Error al registrar.';
      }
    })
    .catch(function () {
      btnReg.disabled = false; btnReg.textContent = 'Solicitar acceso';
      regMsg.className = 'msg msg--err'; regMsg.textContent = 'Error de conexión.';
    });
  });
})();
</script>
</body>
</html>
